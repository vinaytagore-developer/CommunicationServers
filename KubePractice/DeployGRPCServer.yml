apiVersion: apps/v1
kind: Deployment
metadata:
   name: grpcserverdeployment
spec:
  replicas: 1
  selector:
     matchLabels:
         app: grpcserverapp
  template:
    metadata:
       labels:
         app: grpcserverapp
    spec:
       imagePullSecrets:
          - name: ghcr-secret
       containers:
          - name: grpcservercontainer
            image: ghcr.io/vinaytagore-developer/grpcserver:v2